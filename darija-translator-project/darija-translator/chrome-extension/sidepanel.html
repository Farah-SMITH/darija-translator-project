<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darija Translator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      padding: 16px;
    }

    header {
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      color: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 { font-size: 1.1rem; font-weight: 700; }
    header span { font-size: 1.5rem; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    textarea, input[type="text"], input[type="password"] {
      width: 100%;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      resize: vertical;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea:focus, input:focus {
      outline: none;
      border-color: #40916c;
    }

    #sourceText { min-height: 90px; }
    #translationResult {
      min-height: 90px;
      direction: rtl;
      font-size: 1.1rem;
      line-height: 1.6;
      background: #f7faf9;
      color: #1a202c;
    }

    .row { display: flex; gap: 8px; margin-bottom: 12px; }

    select {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      background: #fff;
    }

    button {
      background: #2d6a4f;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #40916c; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #a0aec0; cursor: not-allowed; }

    #btnGrab {
      background: #3182ce;
      font-size: 0.82rem;
      padding: 8px 12px;
    }
    #btnGrab:hover { background: #2b6cb0; }

    #btnSpeak {
      background: #805ad5;
      font-size: 0.82rem;
      padding: 8px 12px;
    }
    #btnSpeak:hover { background: #6b46c1; }

    #btnClear {
      background: #e53e3e;
      font-size: 0.82rem;
      padding: 8px 12px;
    }
    #btnClear:hover { background: #c53030; }

    .status {
      font-size: 0.82rem;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 8px;
    }
    .status.loading { background: #ebf8ff; color: #2b6cb0; }
    .status.error   { background: #fff5f5; color: #c53030; }
    .status.success { background: #f0fff4; color: #276749; }
    .status.hidden  { display: none; }

    .settings-toggle {
      font-size: 0.8rem;
      color: #718096;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      padding: 0;
      margin-top: 4px;
    }

    #settingsPanel { display: none; }
    #settingsPanel.open { display: block; }
  </style>
</head>
<body>
  <header>
    <span>🇲🇦</span>
    <h1>Darija Translator</h1>
  </header>

  <!-- Settings -->
  <div class="card">
    <button class="settings-toggle" id="toggleSettings">⚙️ Server Settings</button>
    <div id="settingsPanel">
      <br>
      <label for="serverUrl">REST Server URL</label>
      <input type="text" id="serverUrl"
             placeholder="http://localhost:8080/darija-translator/api/translate" />
      <br><br>
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="admin" />
      <br><br>
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />
      <br><br>
      <button id="btnSaveSettings">Save Settings</button>
    </div>
  </div>

  <!-- Source text -->
  <div class="card">
    <label for="sourceText">Text to Translate</label>
    <textarea id="sourceText" placeholder="Type or paste text here…"></textarea>
    <br>
    <div class="row">
      <select id="sourceLanguage">
        <option value="English">English</option>
        <option value="French">French</option>
        <option value="Spanish">Spanish</option>
        <option value="Arabic (Modern Standard)">Arabic (MSA)</option>
        <option value="German">German</option>
        <option value="Italian">Italian</option>
      </select>
      <button id="btnGrab">📋 Grab Selected</button>
    </div>
    <button id="btnTranslate" style="width:100%;">Translate to Darija ➜</button>
    <div id="statusBox" class="status hidden"></div>
  </div>

  <!-- Result -->
  <div class="card">
    <label>Darija Translation (دارجة)</label>
    <textarea id="translationResult" readonly placeholder="…يظهر الترجمة هنا"></textarea>
    <br>
    <div class="row">
      <button id="btnSpeak">🔊 Read Aloud</button>
      <button id="btnClear">🗑️ Clear</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
